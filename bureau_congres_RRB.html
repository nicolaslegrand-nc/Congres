<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Congrès — Installation du bureau · RRB</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;color:#1a2a4a;
  background:linear-gradient(160deg,#2f5290 0%,#5a86cf 50%,#2f5290 100%);padding:14px}
.wrap{max-width:940px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;
  padding:14px 18px;box-shadow:0 6px 22px rgba(0,0,0,.22);margin-bottom:14px}
.hdr .logo{height:56px;width:auto}
.hdr .txt{flex:1}
.hdr h1{margin:0;font-size:1.16rem;color:#1a2a4a;letter-spacing:.2px}
.hdr .sub{font-size:.85rem;color:#5a6b8c;margin-top:3px;font-weight:600}
.hdr .badge{text-align:center;background:#eef3fd;border:1px solid #cfe0fb;border-radius:12px;padding:6px 12px}
.hdr .badge .n{font-size:1.35rem;font-weight:900;color:#1a4dbf;line-height:1}
.hdr .badge .l{font-size:.6rem;font-weight:800;color:#5a6b8c;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

.xbar{margin:6px 0 2px;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
.xlab{color:rgba(255,255,255,.82);font-weight:700;font-size:.8rem}
.xbar button{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.45);border-radius:20px;padding:7px 15px;font:inherit;font-weight:700;font-size:.8rem;cursor:pointer;transition:.12s}
.xbar button:hover{background:rgba(255,255,255,.26)}
.xbar button:disabled{opacity:.5;cursor:wait}
.banner{background:#fff8e6;border:1px solid #f0d98a;border-radius:12px;padding:10px 14px;margin-bottom:14px;
  color:#7a5a00;font-size:.82rem;font-weight:600;display:flex;gap:9px;align-items:flex-start;box-shadow:0 3px 12px rgba(0,0,0,.12)}
.banner .i{font-size:1rem;line-height:1.2}

.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab{flex:1;min-width:120px;border:none;border-radius:11px;padding:12px 8px;cursor:pointer;
  font-size:.88rem;font-weight:800;background:#e9eef8;color:#33456b;transition:.15s;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.tab.active{background:#fff;color:#1a4dbf;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.panel{display:none}.panel.active{display:block}

.card{background:#fff;border-radius:14px;padding:18px 18px 20px;box-shadow:0 6px 22px rgba(0,0,0,.22);margin-bottom:14px;position:relative}
.card-logo{position:absolute;top:13px;right:16px;width:112px;height:48px;background-repeat:no-repeat;background-position:top right;background-size:contain;opacity:.8;pointer-events:none}
.bureau{border-top:3px solid #1a4dbf;box-shadow:0 8px 26px rgba(26,77,191,.20)}
.card-h{font-size:1.02rem;font-weight:900;color:#1a2a4a;text-align:center;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #eef2fa}
.card-sub{display:block;font-size:.74rem;font-weight:600;color:#7183a4;margin-top:4px}

.bureau-pres{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:6px}
.bureau-pres .role{font-size:.76rem;font-weight:800;color:#1a4dbf;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 2px}
.bureau-pres .nom{font-size:1.2rem;font-weight:900;color:#1a2a4a}
.stat{margin-top:9px;font-size:.9rem;color:#33456b;font-weight:600}
.stat b{color:#1a2a4a;font-weight:900}

.sub-sec{margin-top:18px;padding-top:14px;border-top:1px dashed #dbe3f2}
.sec-lab{font-size:.72rem;font-weight:800;color:#1a4dbf;text-transform:uppercase;letter-spacing:.6px;text-align:center;margin-bottom:14px}

.people{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}
.person{display:flex;flex-direction:column;align-items:center;text-align:center;width:150px}
.person .role{font-size:.66rem;font-weight:800;color:#7183a4;text-transform:uppercase;letter-spacing:.4px;margin:6px 0 1px;line-height:1.15}
.person .nom{font-size:.9rem;font-weight:800;color:#33456b;line-height:1.2;min-height:2.4em;display:flex;flex-direction:column;justify-content:center}

.pill{display:inline-block;font-size:.64rem;font-weight:800;color:#fff;border-radius:20px;padding:2px 9px;
  max-width:100%;white-space:normal;overflow-wrap:break-word;line-height:1.15;margin-top:4px}

.med{border-radius:50%;overflow:hidden;border:4px solid #ccc;background:#eef2fa;position:relative}
.person{transition:transform .14s ease-out}
.person.has-photo{cursor:zoom-in}
.person.has-photo:hover,.person.has-photo.zoomed{transform:scale(1.5);z-index:40}
.person.has-photo:hover .med,.person.has-photo.zoomed .med{box-shadow:0 8px 22px rgba(0,0,0,.3)}
.bureau-pres .med:not(.init):not(.ph),.cp-head .med:not(.init):not(.ph){cursor:zoom-in;transition:transform .14s ease-out}
.bureau-pres .med:not(.init):not(.ph):hover,.bureau-pres .med.zoomed,.cp-head .med:not(.init):not(.ph):hover,.cp-head .med.zoomed{transform:scale(1.4);z-index:40;box-shadow:0 10px 28px rgba(0,0,0,.32)}
.med img{width:100%;height:100%;object-fit:cover;display:block}
.med.init{display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff}
.med.ph{display:flex;align-items:center;justify-content:center;background:#eef2fa;border-color:#c4d1ea;border-style:dashed}
.med.ph svg{width:56%;height:56%}
.med.pres{width:118px;height:118px;border-width:5px}
.med.init.pres{font-size:2rem}
.med.sm{width:74px;height:74px}
.med.init.sm{font-size:1.35rem}
.med.xs{width:52px;height:52px;border-width:3px}
.med.init.xs{font-size:.95rem}
.people.xs-row{gap:12px 14px}
.person.xs{width:106px}
.person.xs .role{font-size:.58rem;margin-top:5px}
.person.xs .nom{font-size:.76rem;min-height:1.9em}
.person.xs .pill{font-size:.58rem;padding:1px 7px;margin-top:3px}
.med.cp{width:70px;height:70px}
.med.init.cp{font-size:1.25rem}

.todo-inline{color:#9aa8c4;font-style:italic;font-weight:700}

.note{margin-top:18px;font-size:.78rem;color:#5a6b8c;line-height:1.5;background:#f7f9fd;border-radius:10px;padding:11px 13px}
.note b{color:#1a2a4a}

.groups{display:flex;flex-direction:column;gap:11px}
.grp-card{background:#fbfcfe;border:1px solid #e6ecf7;border-left-width:6px;border-radius:12px;padding:12px 15px}
.grp-top{display:flex;align-items:center;gap:14px}
.grp-card.hors{background:#f6f7fb;border-style:dashed}
.grp-body{flex:1;min-width:0}
.grp-role{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.55px;color:#8494b4;margin-bottom:2px}
.grp-nom{font-size:1.12rem;font-weight:900;color:#1a2a4a;line-height:1.15}
.grp-aff{margin-top:6px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.grp-seats{font-size:.74rem;font-weight:700;color:#5a6b8c}
.grp-hg{font-size:.8rem;font-weight:700;color:#8a6d5a}
.grp-elus{margin-top:9px;padding-top:9px;border-top:1px dashed #e0e7f3;display:flex;flex-wrap:wrap;gap:3px 5px}
.elu{font-size:.64rem;color:#4a5a7a;line-height:1.35;padding:1px 6px;background:#eff3fa;border-radius:5px;white-space:nowrap}
.elu.tete{font-weight:800;background:#d6e4fb;color:#12244a}
.grp-det>summary{display:block;list-style:none;cursor:pointer;outline:none}
.grp-det>summary::-webkit-details-marker{display:none}
.grp-det>summary::marker{content:""}
.grp-chevron{margin-left:auto;padding-left:8px;color:#9aa8c4;font-size:1.05rem;flex:0 0 auto;transition:transform .2s;align-self:center}
.grp-det[open] .grp-chevron{transform:rotate(180deg)}
.grp-det>summary:hover .grp-nom{color:#1a4dbf}
.med.grp{width:58px;height:58px;flex:0 0 auto;border-width:3px}
.hemi{width:100%;max-width:560px;height:auto;display:block;margin:2px auto 0}
.seat{cursor:default}
.hemi-legend{display:flex;flex-wrap:wrap;gap:7px 15px;justify-content:center;margin-top:8px}
.leg{font-size:.78rem;color:#37476a;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.leg-dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex:0 0 auto}
.leg b{color:#1a2a4a}
.arc-seg{cursor:pointer;transition:opacity .06s ease-out}
.hemi text{pointer-events:none}
.cong-hint{text-align:center;font-size:.72rem;color:#8494b4;font-weight:600;margin-top:4px}
.cong-panel{margin:8px auto 2px;max-width:520px;background:#f7f9fd;border:1px solid #e6ecf7;border-radius:12px;padding:12px 14px;height:228px;overflow:hidden;display:flex;flex-direction:column}
.cp-head{display:flex;align-items:center;gap:13px;flex:0 0 auto}
.cp-info{flex:1;min-width:0}
.cp-grp{margin-bottom:5px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.cp-eff{color:#1a2a4a;font-size:.8rem}
.cp-line{font-size:.82rem;color:#37476a;line-height:1.5}
.cp-lab{font-size:.66rem;font-weight:800;color:#8494b4;text-transform:uppercase;letter-spacing:.3px;margin-right:6px}
.cp-line b{color:#1a2a4a}
.cp-elus{margin-top:9px;padding-top:9px;border-top:1px dashed #e0e7f3;display:flex;flex-wrap:wrap;gap:4px 5px;align-content:flex-start}
.cp-empty{margin:auto;color:#9aa8c4;font-size:.82rem;text-align:center;font-weight:600;padding:6px;line-height:1.4}
.med.init.grp{font-size:1rem}

.foot{text-align:center;color:#dbe6ff;font-size:.72rem;font-weight:600;margin-top:8px;padding:8px;line-height:1.5}
.foot b{color:#fff}

@media(max-width:560px){
  .cong-panel{height:294px}
  .card-logo{width:74px;height:32px;top:11px;right:12px}
  .hdr h1{font-size:1rem}.hdr .logo{height:40px}.hdr .badge{display:none}
  .card{padding:16px 14px}.med.pres{width:104px;height:104px}
  .tab{min-width:104px;font-size:.8rem;padding:10px 6px}
  .bureau-pres .nom{font-size:1.08rem}
  .person{width:132px}
}
</style>
</head>

    </div>
    <div class="badge"><div class="n">54</div><div class="l">conseillers</div></div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>

  <div class="foot">

</div>

/* ================= HELPERS ================= */
function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initials(nom){
  var p=(nom||'').trim().split(/\s+/).filter(Boolean);
  if(!p.length)return '?';
  var a=p[0][0]||'', b=p.length>1?(p[p.length-1][0]||''):'';
  return (a+b).toUpperCase();
}
function medaillon(person,cls){
  person=person||{};
  var col=person.couleur||'#9db4de';
  if(person.photo)  return '<div class="med '+cls+'" style="border-color:'+col+'"><img src="'+person.photo+'"></div>';
  if(person.nom)    return '<div class="med init '+cls+'" style="background:'+col+';border-color:'+col+'">'+esc(initials(person.nom))+'</div>';
  return '<div class="med ph '+cls+'">'+SIL+'</div>';
}
function ordF(i,genre){var f=(genre==='F');return i===0?(f?'1\u1d49\u02b3\u1d49':'1\u1d49\u02b3'):(i+1)+'\u1d49';} /* 1er/1ère, 2e... */
function presRole(genre){return genre==='F'?'Pr\u00e9sidente du Congr\u00e8s':genre==='M'?'Pr\u00e9sident du Congr\u00e8s':'Pr\u00e9sident\u00b7e du Congr\u00e8s';}
function vpRole(i,genre){var f=(genre==='F');var ord=i===0?(f?'1\u1d49\u02b3\u1d49':'1\u1d49\u02b3'):(i+1)+'\u1d49';return ord+' '+(f?'vice-pr\u00e9sidente':genre==='M'?'vice-pr\u00e9sident':'vice-pr\u00e9sident\u00b7e');}
function secRole(i){return ordF(i,'')+' secr\u00e9taire';}
function quesRole(i,genre){return ordF(i,genre)+' '+(genre==='F'?'questeure':'questeur');}
function cpRole(kind,genre){
  var f=(genre==='F');
  if(kind==='president') return f?'Pr\u00e9sidente':genre==='M'?'Pr\u00e9sident':'Pr\u00e9sident\u00b7e';
  if(kind==='vice')      return f?'Vice-pr\u00e9sidente':genre==='M'?'Vice-pr\u00e9sident':'Vice-pr\u00e9sident\u00b7e';
  return 'Secr\u00e9taire';
}
function pill(person){
  if(!person||!person.groupe)return '';
  return '<div class="pill" style="background:'+(person.couleur||'#9db4de')+'">'+esc(person.groupe)+'</div>';
}
function slot(person,role,cls,wrap){
  person=person||{};
  var ph=person.photo?' has-photo':'';
  return '<div class="person'+(wrap?' '+wrap:'')+ph+'">'+medaillon(person,cls)
    +'<div class="role">'+role+'</div>'
    +'<div class="nom">'+(person.nom?esc(person.nom):'<span class="todo-inline">\u00e0 \u00e9lire</span>')+'</div>'
    +pill(person)+'</div>';
}

function renderBureau(){
  var p=CONGRES.president||{};
  var pres='<div class="bureau-pres">'+medaillon(p,'pres')
    +'<div class="role">'+presRole(p.genre)+'</div>'
    +'<div class="nom">'+(p.nom?esc(p.nom):'<span class="todo-inline">\u00e0 \u00e9lire</span>')+'</div>'
    +pill(p)
    +'</div>';

  var vps=CONGRES.bureau.vps.map(function(v,i){return slot(v,vpRole(i,v.genre),'sm');}).join('');
  var secs=CONGRES.bureau.secretaires.map(function(v,i){return slot(v,secRole(i),'xs','xs');}).join('');
  var ques=CONGRES.bureau.questeurs.map(function(v,i){return slot(v,quesRole(i,v.genre),'xs','xs');}).join('');

  return '<div class="card bureau">'
    +pres
    +'<div class="sub-sec"><div class="sec-lab">Vice-pr\u00e9sidences</div><div class="people">'+vps+'</div></div>'
    +'<div class="sub-sec"><div class="sec-lab">Secr\u00e9taires &amp; questeurs</div><div class="people xs-row">'+secs+ques+'</div></div>'
    +'<div class="note">Le bureau r\u00e9unit le pr\u00e9sident, 8 vice-pr\u00e9sidents, 2 secr\u00e9taires et 2 questeurs, r\u00e9partis \u00e0 la proportionnelle des groupes.</div>'
    +'</div>'
    +congressHemiCard();
}

function renderCP(){
  var c=CONGRES.commission;
  var officers=[
    slot(c.president,cpRole('president',c.president&&c.president.genre),'cp'),
    slot(c.vice,cpRole('vice',c.vice&&c.vice.genre),'cp'),
    slot(c.secretaire,cpRole('secretaire',''),'cp')
  ].join('');
  var membres=c.membres.map(function(m){return slot(m,'Membre','cp');}).join('');
  return '<div class="card">'
    +'<div class="card-h">La commission permanente</div>'
    +'<div class="people">'+officers+'</div>'
    +'<div class="sub-sec"><div class="sec-lab">Membres</div><div class="people">'+membres+'</div></div>'
    +'<div class="note"><b>11 membres</b> \u00e9lus \u00e0 la repr\u00e9sentation proportionnelle des groupes. La commission si\u00e8ge <b>hors des sessions</b> du Congr\u00e8s et adopte des d\u00e9lib\u00e9rations dans les domaines qui lui sont d\u00e9l\u00e9gu\u00e9s \u2014 elle ne peut voter <b>ni les lois du pays ni le budget</b>.</div>'
    +'</div>'
    +commissionHemiCard();
}

function grpEntry(g){
  var p=g.president||{};
  var med=medaillon({couleur:g.couleur,photo:p.photo,nom:p.nom},'grp');
  var role=p.genre==='F'?'Pr\u00e9sidente de groupe':p.genre==='M'?'Pr\u00e9sident de groupe':'Pr\u00e9sident\u00b7e de groupe';
  var hasElus=!!(g.membres&&g.membres.length);
  var body='<div class="grp-body">'
    +'<div class="grp-role">'+role+'</div>'
    +'<div class="grp-nom">'+(p.nom?esc(p.nom):'<span class="todo-inline">\u00e0 \u00e9lire</span>')+'</div>'
    +'<div class="grp-aff"><span class="pill" style="background:'+g.couleur+'">'+esc(g.nom)+'</span>'
    +(g.sieges!=null?'<span class="grp-seats">'+g.sieges+' \u00e9lus</span>':'')+'</div>'
    +'</div>';
  var top='<div class="grp-top">'+med+body+(hasElus?'<span class="grp-chevron" aria-hidden="true">\u25be</span>':'')+'</div>';
  if(hasElus){
    var elus='<div class="grp-elus">'+g.membres.map(function(m){return '<span class="elu">'+esc(m.nom)+'</span>';}).join('')+'</div>';
    return '<details class="grp-card grp-det" style="border-left-color:'+g.couleur+'"><summary>'+top+'</summary>'+elus+'</details>';
  }
  return '<div class="grp-card" style="border-left-color:'+g.couleur+'">'+top+'</div>';
}
function grpHors(h){
  var hasElus=!!(h.membres&&h.membres.length);
  var top='<div class="grp-top">'
    +medaillon({couleur:h.couleur,nom:h.nom},'grp')
    +'<div class="grp-body">'
    +'<div class="grp-role">Hors groupe</div>'
    +'<div class="grp-nom">'+esc(h.nom)+'</div>'
    +'<div class="grp-aff"><span class="grp-hg">Si\u00e8ge hors groupe'+(h.sieges!=null?' \u00b7 '+h.sieges+' \u00e9lus':'')+'</span></div>'
    +'</div>'+(hasElus?'<span class="grp-chevron" aria-hidden="true">\u25be</span>':'')+'</div>';
  if(hasElus){
    var elus='<div class="grp-elus">'+h.membres.map(function(m){return '<span class="elu">'+esc(m.nom)+'</span>';}).join('')+'</div>';
    return '<details class="grp-card grp-det hors" style="border-left-color:'+h.couleur+'"><summary>'+top+'</summary>'+elus+'</details>';
  }
  return '<div class="grp-card hors" style="border-left-color:'+h.couleur+'">'+top+'</div>';
}
function groupesCard(){
  var bySieges=function(a,b){var sa=(a.sieges==null?-1:a.sieges),sb=(b.sieges==null?-1:b.sieges);return sb-sa;};
  var items=CONGRES.groupes.slice().sort(bySieges).map(grpEntry).join('');
  var hg=(CONGRES.hors_groupe||[]).slice().sort(bySieges).map(grpHors).join('');
  return '<div class="card">'
    +'<div class="card-h">Les groupes politiques</div>'
    +'<div class="groups">'+items+hg+'</div>'
    +'<div class="note">Groupes class\u00e9s par nombre d\u2019\u00e9lus (6 minimum pour former un groupe). <b>L\u2019\u00c9veil oc\u00e9anien si\u00e8ge hors groupe.</b></div>'
    +'</div>';
}

/* ================= HÉMICYCLES ================= */
function getSeats(tot,CX,CY){
  var rd;
  if(tot<=14) rd=[{r:175,f:.43},{r:250,f:.57}];
  else if(tot<=22) rd=[{r:170,f:.41},{r:245,f:.59}];
  else rd=[{r:135,f:.30},{r:200,f:.34},{r:265,f:.36}];
  var rings=rd.map(function(r){return {r:r.r,n:Math.round(tot*r.f)};});
  rings[rings.length-1].n+=tot-rings.reduce(function(s,r){return s+r.n;},0);
  var seats=[];
  rings.forEach(function(ring){
    for(var i=0;i<ring.n;i++){
      var a=Math.PI-i*Math.PI/Math.max(ring.n-1,1);
      seats.push({x:CX+ring.r*Math.cos(a),y:CY-ring.r*Math.sin(a),a:a});
    }
  });
  seats.sort(function(a,b){return b.a-a.a;});
  return seats;
}
function congressOrder(){
  var groups=CONGRES.groupes.slice().filter(function(g){return (g.sieges||0)>0;});
  var hors=(CONGRES.hors_groupe||[]).slice().filter(function(h){return (h.sieges||0)>0;});
  var gTot=groups.reduce(function(s,g){return s+(g.sieges||0);},0);
  var target=gTot/2,cum=0,bestIdx=0,bestDiff=1e9;
  for(var i=0;i<=groups.length;i++){var d=Math.abs(cum-target);if(d<bestDiff){bestDiff=d;bestIdx=i;}if(i<groups.length)cum+=(groups[i].sieges||0);}
  var seq=[];
  for(var a=0;a<bestIdx;a++)seq.push(groups[a]);
  hors.forEach(function(h){var c={};for(var k in h)c[k]=h[k];c.__hors=true;seq.push(c);});
  for(var b=bestIdx;b<groups.length;b++)seq.push(groups[b]);
  return seq;
}
function hemiArc(seq,total,opts){
  opts=opts||{};
  CONG_SEQ=seq;CONG_LOCK=-1;
  var CX=450,CY=360,Ro=300,Ri=168,pad=28;
  var vbx=CX-Ro-pad,vby=CY-Ro-pad,vbw=2*(Ro+pad),vbh=Ro+pad+34;
  function P(r,a){return [(CX+r*Math.cos(a)),(CY-r*Math.sin(a))];}
  var s='<svg class="hemi" viewBox="'+vbx.toFixed(0)+' '+vby.toFixed(0)+' '+vbw.toFixed(0)+' '+vbh.toFixed(0)+'" xmlns="http://www.w3.org/2000/svg">';
  var start=Math.PI;
  seq.forEach(function(g,idx){
    var frac=(g.sieges||0)/total, end=start-frac*Math.PI;
    var o1=P(Ro,start),o2=P(Ro,end),i2=P(Ri,end),i1=P(Ri,start);
    var d='M'+o1[0].toFixed(1)+','+o1[1].toFixed(1)
      +' A'+Ro+','+Ro+' 0 0 1 '+o2[0].toFixed(1)+','+o2[1].toFixed(1)
      +' L'+i2[0].toFixed(1)+','+i2[1].toFixed(1)
      +' A'+Ri+','+Ri+' 0 0 0 '+i1[0].toFixed(1)+','+i1[1].toFixed(1)+' Z';
    s+='<path class="arc-seg" data-i="'+idx+'" onmouseover="congSeg('+idx+',false)" onmouseout="congOut(event)" onclick="congSeg('+idx+',true)" d="'+d+'" fill="'+g.couleur+'" stroke="#ffffff" stroke-width="2.6"><title>'+esc(g.nom)+(g.__hors?' (hors groupe)':'')+' \u00b7 '+(g.sieges||0)+'</title></path>';
    // étiquette du nombre sur le segment si assez large
    if(frac>0.06){var mid=(start+end)/2,lp=P((Ro+Ri)/2,mid);
      s+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+6).toFixed(1)+'" text-anchor="middle" font-family="Segoe UI,Arial" font-size="26" font-weight="900" fill="#ffffff">'+(g.sieges||0)+'</text>';}
    start=end;
  });
  if(opts.center!=null){
    s+='<text x="'+CX+'" y="'+(CY-2)+'" text-anchor="middle" font-family="Segoe UI,Arial" font-size="58" font-weight="900" fill="#1a2a4a">'+opts.center+'</text>';
    if(opts.centerLabel)s+='<text x="'+CX+'" y="'+(CY+24)+'" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="700" fill="#7183a4">'+esc(opts.centerLabel)+'</text>';
  }
  return s+'</svg>';
}
function hemiSVG(id,specs,opts){
  opts=opts||{};
  var CX=450,CY=360,n=specs.length;
  if(!n)return '';
  var seats=getSeats(n,CX,CY);
  var maxR=n>40?290:(n>22?260:250),pad=34;
  var vbx=CX-maxR-pad,vby=CY-maxR-pad,vbw=2*(maxR+pad),vbh=maxR+pad+40;
  var seatR=n>44?10.5:(n>30?12:(n>18?14:17));
  var s='<svg class="hemi" viewBox="'+vbx.toFixed(0)+' '+vby.toFixed(0)+' '+vbw.toFixed(0)+' '+vbh.toFixed(0)+'" xmlns="http://www.w3.org/2000/svg">';
  seats.forEach(function(seat,i){
    var sp=specs[i]||{},col=sp.col||'#c9d3e6',sid=id+'g'+i;
    s+='<defs><radialGradient id="'+sid+'" cx="34%" cy="30%" r="70%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/><stop offset="45%" stop-color="'+col+'" stop-opacity="0"/><stop offset="100%" stop-color="#000000" stop-opacity="0.32"/></radialGradient></defs>';
    s+='<g class="seat">'+(sp.title?'<title>'+esc(sp.title)+'</title>':'')
      +'<circle cx="'+seat.x.toFixed(1)+'" cy="'+seat.y.toFixed(1)+'" r="'+seatR+'" fill="'+col+'" stroke="#ffffff" stroke-width="1.4"/>'
      +'<circle cx="'+seat.x.toFixed(1)+'" cy="'+seat.y.toFixed(1)+'" r="'+seatR+'" fill="url(#'+sid+')"/>'
      +'</g>';
  });
  if(opts.center!=null){
    s+='<text x="'+CX+'" y="'+(CY-4)+'" text-anchor="middle" font-family="Segoe UI,Arial" font-size="60" font-weight="900" fill="#1a2a4a">'+opts.center+'</text>';
    if(opts.centerLabel)s+='<text x="'+CX+'" y="'+(CY+24)+'" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="700" fill="#7183a4">'+esc(opts.centerLabel)+'</text>';
  }
  return s+'</svg>';
}
function legItem(col,label,n){return '<span class="leg"><span class="leg-dot" style="background:'+col+'"></span>'+esc(label)+' <b>'+n+'</b></span>';}
function bySiegesDesc(a,b){return (b.sieges||0)-(a.sieges||0);}

function congressSeatSpecs(){
  var groups=CONGRES.groupes.slice().sort(bySiegesDesc).filter(function(g){return (g.sieges||0)>0;});
  var hors=(CONGRES.hors_groupe||[]).slice().sort(bySiegesDesc).filter(function(h){return (h.sieges||0)>0;});
  var groupTotal=groups.reduce(function(s,g){return s+(g.sieges||0);},0);
  /* insérer le(s) hors-groupe au centre : frontière de groupe la plus proche du milieu */
  var target=groupTotal/2,cum=0,bestIdx=0,bestDiff=1e9;
  for(var i=0;i<=groups.length;i++){
    var diff=Math.abs(cum-target);
    if(diff<bestDiff){bestDiff=diff;bestIdx=i;}
    if(i<groups.length)cum+=(groups[i].sieges||0);
  }
  var specs=[];
  function pushG(g){for(var k=0;k<(g.sieges||0);k++)specs.push({col:g.couleur,title:g.nom});}
  function pushH(h){for(var k=0;k<(h.sieges||0);k++)specs.push({col:h.couleur,title:esc(h.nom)+' (hors groupe)'});}
  for(var a=0;a<bestIdx;a++)pushG(groups[a]);
  hors.forEach(pushH);
  for(var b=bestIdx;b<groups.length;b++)pushG(groups[b]);
  return specs;
}
var CONG_SEQ=[];
function surnameKey(nom){
  var w=(nom||'').split(/\s+/);
  for(var i=0;i<w.length;i++){var t=w[i].replace(/[.,]/g,'');if(t&&t===t.toUpperCase()&&t!==t.toLowerCase())return w.slice(i).join(' ').toLocaleUpperCase('fr');}
  return (nom||'').toLocaleUpperCase('fr');
}
function congPanelHTML(g){
  var p=g.president||{};
  var med=g.__hors?medaillon({couleur:g.couleur,nom:g.nom},'grp'):medaillon({couleur:g.couleur,photo:p.photo,nom:p.nom},'grp');
  var chefLine=g.__hors
    ?'<div class="cp-line"><span class="cp-lab">Statut</span> <b>Hors groupe</b></div>'
    :'<div class="cp-line"><span class="cp-lab">Chef de groupe</span> '+(p.nom?('<b>'+esc(p.nom)+'</b>'):'<span class="todo-inline">\u00e0 \u00e9lire</span>')+'</div>';
  var elus='';
  if(g.membres&&g.membres.length){
    var ms=g.membres.slice().sort(function(a,b){return surnameKey(a.nom).localeCompare(surnameKey(b.nom),'fr');});
    elus='<div class="cp-elus">'+ms.map(function(m){return '<span class="elu">'+esc(m.nom)+'</span>';}).join('')+'</div>';
  }
  return '<div class="cp-head">'+med
    +'<div class="cp-info">'
    +'<div class="cp-grp"><span class="pill" style="background:'+g.couleur+'">'+esc(g.nom)+'</span><b class="cp-eff">'+(g.sieges||0)+' \u00e9lus</b></div>'
    +chefLine
    +'</div></div>'
    +elus;
}
var CONG_LOCK=-1;
function congSetOpacity(active){
  var segs=document.querySelectorAll('.arc-seg');
  for(var k=0;k<segs.length;k++){var di=parseInt(segs[k].getAttribute('data-i'),10);segs[k].style.opacity=(active<0||di===active)?'1':'0.4';}
}
var _congT=null,_shT=null;
function sendHeightSoon(){if(_shT)clearTimeout(_shT);_shT=setTimeout(function(){_shT=null;sendHeight();},130);}
function congSeg(i,lock){
  if(_congT){clearTimeout(_congT);_congT=null;}
  var g=CONG_SEQ[i];if(!g)return;
  if(lock){ if(CONG_LOCK===i){CONG_LOCK=-1;congReset();return;} CONG_LOCK=i; }
  var pan=document.getElementById('cong-panel');if(pan)pan.innerHTML=congPanelHTML(g);
  congSetOpacity(i);
}
function congEmptyHTML(){return '<div class="cp-empty">Survolez ou touchez un groupe pour voir sa composition</div>';}
function congReset(){
  if(_congT){clearTimeout(_congT);_congT=null;}
  if(CONG_LOCK>=0){ var g=CONG_SEQ[CONG_LOCK],pan=document.getElementById('cong-panel');if(pan&&g)pan.innerHTML=congPanelHTML(g); congSetOpacity(CONG_LOCK); }
  else { congSetOpacity(-1); var p2=document.getElementById('cong-panel'); if(p2)p2.innerHTML=congEmptyHTML(); }
}
function congOut(e){
  var to=e&&e.relatedTarget;
  if(to&&to.closest&&to.closest('.arc-seg'))return; /* on passe à un autre segment : rien */
  if(_congT)clearTimeout(_congT);
  _congT=setTimeout(function(){_congT=null;congReset();},85); /* reset diff\u00e9r\u00e9 court : anti-vibration au bord des segments */
}
function congDocClick(e){
  if(CONG_LOCK<0)return;
  var t=e&&e.target;
  if(t&&t.closest&&(t.closest('.arc-seg')||t.closest('.cong-panel')))return; /* clic sur un segment ou dans le panneau : on ne défige pas */
  CONG_LOCK=-1; congReset(); /* clic ailleurs : on défige et on recolorise */
}
function initTapZoom(){
  document.addEventListener('click',function(e){
    var m=e.target.closest('.person.has-photo, .bureau-pres .med:not(.init):not(.ph), .cp-head .med:not(.init):not(.ph)');
    var cur=document.querySelector('.zoomed');
    if(cur&&cur!==m)cur.classList.remove('zoomed');
    if(m)m.classList.toggle('zoomed');
  });
}
function congressHemiCard(){
  var seq=congressOrder();
  var total=seq.reduce(function(s,g){return s+(g.sieges||0);},0);
  if(!total)return '';
  var leg=congressOrder().map(function(g){return legItem(g.couleur,g.nom+(g.__hors?' (hors groupe)':''),g.sieges);}).join('');
  return '<div class="card">'
    +'<div class="card-h">L\u2019h\u00e9micycle du Congr\u00e8s<span class="card-sub">avant l\u2019\u00e9lection du Gouvernement de la Nouvelle-Cal\u00e9donie</span></div>'
    +'<div class="arc-wrap">'+hemiArc(seq,total,{center:total,centerLabel:'\u00e9lus'})+'</div>'
    +'<div class="cong-panel" id="cong-panel">'+congEmptyHTML()+'</div>'
    +'<div class="hemi-legend">'+leg+'</div>'
    +'<div class="note">R\u00e9partition des si\u00e8ges par groupe ; l\u2019<b>\u00c9veil oc\u00e9anien</b> si\u00e8ge hors groupe. <b>54 conseillers</b> \u2014 32 Province Sud, 15 Province Nord, 7 \u00celes Loyaut\u00e9, issus du scrutin du 28\u00a0juin 2026.</div>'
    +'</div>';
}
function commissionSeatSpecs(){
  var c=CONGRES.commission,order={};
  CONGRES.groupes.slice().sort(bySiegesDesc).forEach(function(g,idx){order[g.nom]=idx;});
  (CONGRES.hors_groupe||[]).forEach(function(h){order[h.nom]=0.5;});
  var people=[{p:c.president,r:'Pr\u00e9sident\u00b7e'},{p:c.vice,r:'Vice-pr\u00e9sident\u00b7e'},{p:c.secretaire,r:'Secr\u00e9taire'}]
    .concat((c.membres||[]).map(function(m){return {p:m,r:'Membre'};}));
  var specs=people.filter(function(x){return x.p;}).map(function(x){
    return {col:x.p.couleur||'#c9d3e6',groupe:x.p.groupe||'',
      title:(x.p.nom?esc(x.p.nom):'\u00e0 \u00e9lire')+(x.p.groupe?(' \u2014 '+esc(x.p.groupe)):'')+' ('+x.r+')'};
  });
  specs.sort(function(a,b){var oa=(order[a.groupe]==null?200:order[a.groupe]),ob=(order[b.groupe]==null?200:order[b.groupe]);return oa-ob;});
  return specs;
}
function commissionHemiCard(){
  var specs=commissionSeatSpecs();
  if(!specs.length)return '';
  var counts={},colOf={};
  specs.forEach(function(sp){if(!sp.groupe)return;counts[sp.groupe]=(counts[sp.groupe]||0)+1;colOf[sp.groupe]=sp.col;});
  var leg='';Object.keys(counts).forEach(function(k){leg+=legItem(colOf[k]||'#c9d3e6',k,counts[k]);});
  return '<div class="card">'
    +'<div class="card-h">L\u2019h\u00e9micycle de la commission permanente</div>'
    +hemiSVG('cp',specs,{center:specs.length,centerLabel:'membres'})
    +'<div class="hemi-legend">'+leg+'</div>'
    +'<div class="note">Les <b>'+specs.length+' membres</b> de la commission, plac\u00e9s et color\u00e9s selon leur groupe. Survolez un si\u00e8ge pour afficher le nom.</div>'
    +'</div>';
}

/* ================= ONGLETS ================= */
var TABS=[
  {id:'bureau', lab:'Le Congr\u00e8s',           render:renderBureau},
  {id:'cp',     lab:'Commission permanente', render:renderCP}
];
function switchTab(id){
  TABS.forEach(function(t){
    document.getElementById('tab-'+t.id).classList.toggle('active',t.id===id);
    document.getElementById('panel-'+t.id).classList.toggle('active',t.id===id);
  });
  sendHeight();
}
function build(){
  document.getElementById('hdr-logo').src=LOGO_RRB;
  if(!document.getElementById('rrb-logo-css')){
    var st=document.createElement('style');st.id='rrb-logo-css';
    st.textContent='.card-logo{background-image:url("'+LOGO_RRB+'")}';
    document.head.appendChild(st);
  }
  var fc=document.getElementById('foot-credit');if(fc)fc.innerHTML=(CONGRES.meta&&CONGRES.meta.credit)?('<br>Photos\u00a0: '+esc(CONGRES.meta.credit)):'';
  document.getElementById('tabs').innerHTML=TABS.map(function(t){
    return '<button class="tab" id="tab-'+t.id+'" onclick="switchTab(\''+t.id+'\')">'+t.lab+'</button>';
  }).join('');
  document.getElementById('panels').innerHTML=TABS.map(function(t){
    return '<div class="panel" id="panel-'+t.id+'">'+t.render()+'</div>';
  }).join('');
  document.querySelectorAll('#panels .card').forEach(function(card){
    var lg=document.createElement('span');lg.className='card-logo';lg.setAttribute('aria-hidden','true');
    card.insertBefore(lg,card.firstChild);
  });
  switchTab('bureau');
}

/* ================= AUTO-HAUTEUR IFRAME (front rrb.nc) ================= */
function sendHeight(){
  try{var h=document.documentElement.scrollHeight;parent.postMessage({type:'rrb-resize',height:h},'*');}catch(e){}
}
window.addEventListener('load',function(){build();document.addEventListener('click',congDocClick);initTapZoom();sendHeight();setTimeout(sendHeight,300);});
window.addEventListener('resize',sendHeight);
if(window.ResizeObserver){new ResizeObserver(sendHeight).observe(document.body);}
</script>
